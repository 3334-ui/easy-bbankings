<!DOCTYPE html>
<html lang="fr">
 
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — Easy Banking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace;
        }
 
        html,
        body,
        #root {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background: #080b0f;
        }
 
        ::-webkit-scrollbar {
            width: 4px;
        }
 
        ::-webkit-scrollbar-thumb {
            background: #1e2530;
            border-radius: 2px;
        }
 
        .fade-in {
            animation: fadeIn .18s ease;
        }
 
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }
 
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
 
        @keyframes shake {
 
            0%,
            100% {
                transform: translateX(0)
            }
 
            20%,
            60% {
                transform: translateX(-8px)
            }
 
            40%,
            80% {
                transform: translateX(8px)
            }
        }
 
        input[type=number]::-webkit-inner-spin-button {
            -webkit-appearance: none;
        }
 
        select option {
            background: #0d1117;
        }
    </style>
</head>
 
<body>
    <div id="root"></div>
    <script type="text/babel-source" id="app-source">
        const { useState, useMemo, useEffect } = React;
 
        const ADMIN_AUTH_KEY = 'bnp_admin_token';
        let adminToken = localStorage.getItem(ADMIN_AUTH_KEY) || '';
 
        const DEFAULT_CFG = {
            name: "Ayoub",
            pin: "12345",
            accounts: [
                { id: 1, label: "M. AYOUB KHEIR", type: "À vue", iban: "BE39 0004 6429 2419", suffix: "2419", balance: 6.77, currency: "EUR" },
                { id: 2, label: "M. AYOUB KHEIR", type: "Épargne", iban: "BE39 0004 6429 1544", suffix: "1544", balance: 0.00, currency: "EUR" },
                { id: 3, label: "KHEIR ALIYAAH", type: "Épargne", iban: "BE39 0004 6429 7891", suffix: "7891", balance: 220.00, currency: "EUR" }
            ],
            seedTransfers: [
                { id: 1, from_iban: "BE39 0004 6429 2419", to_name: "CEYLAN SPRL", to_iban: "BE71 3630 2345 6789", amount: -10.00, type: "Paiement par carte", date: "2025-03-08", card: "4871 04•• •••• 7560", seq: 25 },
                { id: 2, from_iban: "BE39 0004 6429 2419", to_name: "M AYOUB EL KHADIMI", to_iban: "BE45 7310 1234 5678", amount: 10.00, type: "Virement instantané en euros", date: "2025-03-08", seq: 24 },
                { id: 3, from_iban: "BE39 0004 6429 2419", to_name: "NAD 133 DISON", to_iban: "BE88 0012 3456 7890", amount: -8.90, type: "Paiement par carte", date: "2025-02-17", card: "4871 04•• •••• 7560", seq: 23 },
                { id: 4, from_iban: "BE39 0004 6429 2419", to_name: "POINT CHAUD VERVI…", to_iban: "BE23 1430 9876 5432", amount: -24.35, type: "Paiement par carte", date: "2025-02-15", card: "4871 04•• •••• 7560", seq: 22 },
                { id: 5, from_iban: "BE39 0004 6429 2419", to_name: "MLLE INES IDRAF", to_iban: "BE67 0635 1234 5670", amount: 40.00, type: "Virement instantané en euros", date: "2025-02-14", seq: 21 },
                { id: 6, from_iban: "BE39 0004 6429 2419", to_name: "INES IDRAF", to_iban: "BE67 0635 1234 5670", amount: -140.00, type: "Virement instantané en euros", date: "2025-02-13", seq: 20 },
                { id: 7, from_iban: "BE39 0004 6429 2419", to_name: "KHEIR ALIYAAH", to_iban: "BE39 0004 6429 7891", amount: -50.00, type: "Virement entre comptes", date: "2025-02-10", seq: 19 },
                { id: 8, from_iban: "BE39 0004 6429 2419", to_name: "AMAZON EU", to_iban: "BE45 3109 8765 4321", amount: -34.99, type: "Paiement par carte", date: "2025-02-05", card: "4871 04•• •••• 7560", seq: 18 },
                { id: 9, from_iban: "BE39 0004 6429 2419", to_name: "CARREFOUR LIEGE", to_iban: "BE91 0016 5432 1098", amount: -87.42, type: "Paiement par carte", date: "2025-01-28", card: "4871 04•• •••• 7560", seq: 17 },
                { id: 10, from_iban: "BE39 0004 6429 2419", to_name: "PROXIMUS", to_iban: "BE44 0689 0123 4567", amount: -29.00, type: "Domiciliation", date: "2025-01-15", seq: 16 }
            ]
        };
 
        async function fetchCfg() {
            try {
                const r = await fetch('/api/cfg');
                if (r.ok) { const d = await r.json(); if (d && d.accounts && d.pin) return d; }
            } catch { }
            return JSON.parse(JSON.stringify(DEFAULT_CFG));
        }
 
        async function saveCfgToServer(cfg) {
            const r = await fetch('/api/cfg', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: adminToken, cfg })
            });
            if (r.status === 403) { adminToken = ''; localStorage.removeItem(ADMIN_AUTH_KEY); alert('Session expirée. Reconnecte-toi.'); window.location.reload(); return; }
            if (!r.ok) throw new Error('Server error');
        }
 
        const inp = { width: '100%', background: '#080b0f', border: '1px solid #1e2530', borderRadius: 8, padding: '9px 12px', color: '#e2e8f0', fontSize: 13, outline: 'none', transition: 'border-color .15s' };
        const sel = { ...inp };
 
        function Field({ label, value, onChange, type = 'text' }) {
            return (
                <div>
                    <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '.08em', color: '#4a5568', textTransform: 'uppercase', marginBottom: 5 }}>{label}</div>
                    <input type={type} value={value ?? ''} onChange={e => onChange(type === 'number' ? parseFloat(e.target.value) || 0 : e.target.value)}
                        style={inp}
                        onFocus={e => e.target.style.borderColor = '#00965E'}
                        onBlur={e => e.target.style.borderColor = '#1e2530'} />
                </div>
            );
        }
 
        function GeneralTab({ cfg, setCfg }) {
            return (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                    <div style={{ background: '#0d1117', border: '1px solid #1e2530', borderRadius: 12, padding: 20, display: 'flex', flexDirection: 'column', gap: 14 }}>
                        <div style={{ fontSize: 11, color: '#4a5568', fontWeight: 700, letterSpacing: '.1em', textTransform: 'uppercase' }}>Identité</div>
                        <Field label="Prénom affiché" value={cfg.name} onChange={v => setCfg(c => ({ ...c, name: v }))} />
                        <Field label="Code PIN (5 chiffres)" value={cfg.pin} onChange={v => setCfg(c => ({ ...c, pin: v }))} />
                    </div>
                    <div style={{ background: '#0a120c', border: '1px solid #1a3020', borderRadius: 10, padding: '12px 16px' }}>
                        <div style={{ fontSize: 11, color: '#2d7a45', marginBottom: 8, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.06em' }}>Aperçu</div>
                        <div style={{ fontSize: 13, color: '#4ade80' }}>Prénom : <span style={{ color: '#86efac', fontWeight: 600 }}>{cfg.name || '—'}</span></div>
                        <div style={{ fontSize: 13, color: '#4ade80', marginTop: 6 }}>PIN : <span style={{ color: '#86efac', fontWeight: 600, letterSpacing: 4 }}>{'•'.repeat(String(cfg.pin).length)}</span></div>
                    </div>
                </div>
            );
        }
 
        function AccountsTab({ cfg, setCfg }) {
            const add = () => {
                const newId = Math.max(...cfg.accounts.map(a => a.id), 0) + 1;
                setCfg(c => ({ ...c, accounts: [...c.accounts, { id: newId, label: '', type: 'Épargne', iban: '', suffix: '', balance: 0, currency: 'EUR' }] }));
            };
            const upd = (id, field, val) => setCfg(c => ({ ...c, accounts: c.accounts.map(a => a.id === id ? { ...a, [field]: val } : a) }));
            const del = (id) => { if (!confirm('Supprimer ce compte ?')) return; setCfg(c => ({ ...c, accounts: c.accounts.filter(a => a.id !== id) })); };
 
            return (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                    {cfg.accounts.map(acc => (
                        <div key={acc.id} className="fade-in" style={{ background: '#0d1117', border: `1px solid ${acc.type === 'À vue' ? '#1a3020' : '#1e2530'}`, borderRadius: 12, padding: 16 }}>
                            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
                                <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                                    <span style={{ fontSize: 10, color: '#4a5568', fontWeight: 700, letterSpacing: '.08em', textTransform: 'uppercase' }}>Compte #{acc.id}</span>
                                    <span style={{ fontSize: 9, padding: '2px 6px', borderRadius: 4, fontWeight: 800, letterSpacing: '.04em', textTransform: 'uppercase', background: acc.type === 'À vue' ? '#00965E22' : '#3b82f622', color: acc.type === 'À vue' ? '#4ade80' : '#7dd3fc', border: `1px solid ${acc.type === 'À vue' ? '#00965E44' : '#3b82f644'}` }}>{acc.type || '—'}</span>
                                </div>
                                <button onClick={() => del(acc.id)} style={{ fontSize: 11, color: '#ef4444', background: '#1f0707', border: 'none', padding: '3px 10px', borderRadius: 6, cursor: 'pointer' }}>Supprimer</button>
                            </div>
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                                <div style={{ gridColumn: '1 / -1' }}>
                                    <Field label="Titulaire" value={acc.label} onChange={v => upd(acc.id, 'label', v)} />
                                </div>
                                <div>
                                    <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '.08em', color: '#4a5568', textTransform: 'uppercase', marginBottom: 5 }}>Type</div>
                                    <select value={acc.type} onChange={e => upd(acc.id, 'type', e.target.value)} style={sel} onFocus={e => e.target.style.borderColor = '#00965E'} onBlur={e => e.target.style.borderColor = '#1e2530'}>
                                        <option>À vue</option>
                                        <option>Épargne</option>
                                    </select>
                                </div>
                                <Field label="Devise" value={acc.currency} onChange={v => upd(acc.id, 'currency', v)} />
                                <div style={{ gridColumn: '1 / -1' }}>
                                    <Field label="IBAN" value={acc.iban} onChange={v => upd(acc.id, 'iban', v)} />
                                </div>
                                <Field label="Suffix (4 derniers)" value={acc.suffix} onChange={v => upd(acc.id, 'suffix', v)} />
                                <Field label="Solde (EUR)" value={acc.balance} onChange={v => upd(acc.id, 'balance', parseFloat(v) || 0)} type="number" />
                            </div>
                        </div>
                    ))}
                    <button onClick={add} style={{ background: 'none', border: '1px dashed #1e2530', borderRadius: 12, padding: 14, color: '#2d7a45', fontSize: 13, fontWeight: 600, cursor: 'pointer', transition: 'all .15s', width: '100%' }}
                        onMouseEnter={e => { e.currentTarget.style.borderColor = '#00965E'; e.currentTarget.style.background = '#0a120c'; }}
                        onMouseLeave={e => { e.currentTarget.style.borderColor = '#1e2530'; e.currentTarget.style.background = 'none'; }}>
                        + Ajouter un compte
                    </button>
                </div>
            );
        }
 
        function TransactionsTab({ cfg, setCfg }) {
            const add = () => {
                const newId = Math.max(...cfg.seedTransfers.map(t => t.id), 0) + 1;
                setCfg(c => ({ ...c, seedTransfers: [{ id: newId, from_iban: c.accounts[0]?.iban || '', to_name: '', to_iban: '', bic: '', amount: 0, type: 'Virement instantané en euros', date: new Date().toISOString().split('T')[0], seq: newId }, ...c.seedTransfers] }));
            };
            const upd = (id, field, val) => setCfg(c => ({ ...c, seedTransfers: c.seedTransfers.map(t => t.id === id ? { ...t, [field]: (field === 'amount' || field === 'seq') ? parseFloat(val) || 0 : val } : t) }));
            const del = (id) => { if (!confirm('Supprimer ?')) return; setCfg(c => ({ ...c, seedTransfers: c.seedTransfers.filter(t => t.id !== id) })); };
 
            const favOptions = useMemo(() => {
                const seen = new Set();
                const list = [];
                cfg.accounts.forEach(a => {
                    if (!seen.has(a.label)) { seen.add(a.label); list.push({ name: a.label, iban: a.iban, own: true }); }
                });
                cfg.seedTransfers.forEach(t => {
                    if (t.to_name && !seen.has(t.to_name)) { seen.add(t.to_name); list.push({ name: t.to_name, iban: t.to_iban || '' }); }
                });
                return list;
            }, [cfg.accounts, cfg.seedTransfers]);
 
            const fromOptions = useMemo(() => cfg.accounts.map(a => ({ iban: a.iban, label: `${a.label} ···· ${a.suffix}` })), [cfg.accounts]);
 
            return (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                    <button onClick={add} style={{ background: '#00965E', border: 'none', borderRadius: 10, padding: 12, color: 'white', fontSize: 13, fontWeight: 700, cursor: 'pointer', transition: 'background .15s', letterSpacing: '.04em', WebkitTapHighlightColor: 'transparent' }}
                        onMouseEnter={e => e.currentTarget.style.background = '#007a4e'}
                        onMouseLeave={e => e.currentTarget.style.background = '#00965E'}>
                        + Nouvelle transaction
                    </button>
                    {cfg.seedTransfers.map(tx => (
                        <div key={tx.id} className="fade-in" style={{ background: '#0d1117', border: `1px solid ${tx.amount >= 0 ? '#1a3020' : '#1e2530'}`, borderRadius: 12, padding: 16 }}>
                            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                    <span style={{ fontSize: 14, fontWeight: 800, color: tx.amount >= 0 ? '#4ade80' : '#f87171' }}>
                                        {tx.amount >= 0 ? '+' : ''}{tx.amount} EUR
                                    </span>
                                    <span style={{ fontSize: 9, padding: '2px 6px', borderRadius: 4, fontWeight: 800, letterSpacing: '.04em', textTransform: 'uppercase', background: tx.amount >= 0 ? '#4ade8022' : '#f8717122', color: tx.amount >= 0 ? '#4ade80' : '#f87171', border: `1px solid ${tx.amount >= 0 ? '#4ade8044' : '#f8717144'}` }}>
                                        {tx.amount >= 0 ? 'Crédit' : 'Débit'}
                                    </span>
                                </div>
                                <button onClick={() => del(tx.id)} style={{ fontSize: 11, color: '#ef4444', background: '#1f0707', border: 'none', padding: '3px 10px', borderRadius: 6, cursor: 'pointer', WebkitTapHighlightColor: 'transparent' }}>Supprimer</button>
                            </div>
                            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
 
                                <div>
                                    <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '.08em', color: '#4a5568', textTransform: 'uppercase', marginBottom: 5 }}>Bénéficiaire</div>
                                    <div style={{ display: 'flex', gap: 8 }}>
                                        <input
                                            value={tx.to_name}
                                            onChange={e => upd(tx.id, 'to_name', e.target.value)}
                                            placeholder="Nom..."
                                            style={{ ...inp, flex: 1, minWidth: 0 }}
                                            onFocus={e => e.target.style.borderColor = '#00965E'}
                                            onBlur={e => e.target.style.borderColor = '#1e2530'}
                                        />
                                        <select
                                            value=""
                                            onChange={e => {
                                                const idx = parseInt(e.target.value);
                                                if (isNaN(idx)) return;
                                                const f = favOptions[idx];
                                                upd(tx.id, 'to_name', f.name);
                                                if (f.iban) upd(tx.id, 'to_iban', f.iban);
                                            }}
                                            style={{ ...sel, width: 'auto', minWidth: 44, paddingLeft: 10, paddingRight: 10, flexShrink: 0, color: '#4ade80', borderColor: '#1a3020', background: '#0a120c', cursor: 'pointer', fontSize: 15 }}
                                        >
                                            <option value="" disabled>★</option>
                                            {favOptions.map((f, i) => (
                                                <option key={i} value={i}>{f.own ? '⬡ ' : ''}{f.name}{f.iban ? ' — ' + f.iban.slice(-9) : ''}</option>
                                            ))}
                                        </select>
                                    </div>
                                    {tx.to_name && (
                                        <div style={{ marginTop: 6 }}>
                                            <input
                                                value={tx.to_iban}
                                                onChange={e => upd(tx.id, 'to_iban', e.target.value)}
                                                placeholder="IBAN bénéficiaire (optionnel)"
                                                style={{ ...inp }}
                                                onFocus={e => e.target.style.borderColor = '#00965E'}
                                                onBlur={e => e.target.style.borderColor = '#1e2530'}
                                            />
                                        </div>
                                    )}
                                    {tx.to_name && (
                                        <div style={{ marginTop: 6 }}>
                                            <input
                                                value={tx.bic || ''}
                                                onChange={e => upd(tx.id, 'bic', e.target.value.toUpperCase())}
                                                placeholder="BIC bénéficiaire (optionnel — auto-rempli si virement ≥ 1000 EUR)"
                                                maxLength={11}
                                                style={{ ...inp, fontFamily: 'monospace', letterSpacing: '.04em' }}
                                                onFocus={e => e.target.style.borderColor = '#00965E'}
                                                onBlur={e => e.target.style.borderColor = '#1e2530'}
                                            />
                                        </div>
                                    )}
                                </div>

                                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                                    <Field label="Montant (– = débit)" value={tx.amount} onChange={v => upd(tx.id, 'amount', v)} type="number" />
                                    <Field label="Date (AAAA-MM-JJ)" value={tx.date} onChange={v => upd(tx.id, 'date', v)} />
                                </div>
 
                                <div>
                                    <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '.08em', color: '#4a5568', textTransform: 'uppercase', marginBottom: 5 }}>Type</div>
                                    <select value={tx.type} onChange={e => upd(tx.id, 'type', e.target.value)} style={sel} onFocus={e => e.target.style.borderColor = '#00965E'} onBlur={e => e.target.style.borderColor = '#1e2530'}>
                                        <option>Virement instantané en euros</option>
                                        <option>Virement entre comptes</option>
                                        <option>Paiement par carte</option>
                                        <option>Domiciliation</option>
                                        <option>Virement reçu</option>
                                    </select>
                                </div>
 
                                <div>
                                    <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '.08em', color: '#4a5568', textTransform: 'uppercase', marginBottom: 5 }}>Depuis le compte</div>
                                    <select
                                        value={tx.from_iban}
                                        onChange={e => upd(tx.id, 'from_iban', e.target.value)}
                                        style={sel}
                                        onFocus={e => e.target.style.borderColor = '#00965E'}
                                        onBlur={e => e.target.style.borderColor = '#1e2530'}
                                    >
                                        {fromOptions.map(o => <option key={o.iban} value={o.iban}>{o.label}</option>)}
                                        {!fromOptions.find(o => o.iban === tx.from_iban) && tx.from_iban && (
                                            <option value={tx.from_iban}>{tx.from_iban}</option>
                                        )}
                                    </select>
                                </div>
 
                                {tx.type === 'Paiement par carte' && (
                                    <Field label="Numéro de carte (ex: 4871 04•• •••• 7560)" value={tx.card || ''} onChange={v => upd(tx.id, 'card', v)} />
                                )}
                                <Field label="N° de séquence" value={tx.seq || ''} onChange={v => upd(tx.id, 'seq', v)} type="number" />
                            </div>
                        </div>
                    ))}
                </div>
            );
        }
 
        function AdminPanel() {
            const [cfg, setCfg] = useState(null);
            const [savedCfg, setSavedCfg] = useState(null);
            const [tab, setTab] = useState('general');
            const [toast, setToast] = useState(null);
 
            const { useEffect } = React;
 
            useEffect(() => {
                fetchCfg().then(d => { setCfg(d); setSavedCfg(JSON.stringify(d)); });
            }, []);
 
            const showToast = (msg, color = '#00965E') => {
                setToast({ msg, color });
                setTimeout(() => setToast(null), 2500);
            };
 
            const save = async () => {
                try {
                    await saveCfgToServer(cfg);
                    setSavedCfg(JSON.stringify(cfg));
                    showToast('✓ Sauvegardé');
                } catch {
                    showToast('Erreur serveur', '#ef4444');
                }
            };
 
            const reset = async () => {
                if (!confirm('Reset la config par défaut ?')) return;
                const d = JSON.parse(JSON.stringify(DEFAULT_CFG));
                try {
                    await saveCfgToServer(d);
                    setCfg(d);
                    setSavedCfg(JSON.stringify(d));
                    showToast('Config réinitialisée', '#3b82f6');
                } catch {
                    showToast('Erreur serveur', '#ef4444');
                }
            };
 
            const logout = () => { adminToken = ''; localStorage.removeItem(ADMIN_AUTH_KEY); window.location.reload(); };
 
            const isModified = cfg && JSON.stringify(cfg) !== savedCfg;
 
            if (!cfg) return (
                <div style={{ minHeight: '100vh', background: '#080b0f', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <div style={{ width: 28, height: 28, border: '2px solid #1e2530', borderTopColor: '#00965E', borderRadius: '50%', animation: 'spin .7s linear infinite' }} />
                    <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
                </div>
            );
 
            const tabs = [
                ['general', 'Général'],
                ['accounts', `Comptes (${cfg.accounts.length})`],
                ['transfers', `Transactions (${cfg.seedTransfers.length})`],
            ];
 
            return (
                <div style={{ minHeight: '100vh', background: '#080b0f', color: '#e2e8f0' }}>
                    <div style={{ position: 'sticky', top: 0, zIndex: 50, background: 'rgba(8,11,15,.96)', backdropFilter: 'blur(16px)', borderBottom: '1px solid #1e2530' }}>
                        <div style={{ maxWidth: 720, margin: '0 auto', padding: '14px 20px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                                <div style={{ width: 28, height: 28, background: '#00965E', borderRadius: 7, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></svg>
                                </div>
                                <span style={{ fontSize: 14, fontWeight: 700, color: '#e2e8f0' }}>Easy Banking Admin</span>
                                {isModified && <span style={{ fontSize: 9, background: '#f59e0b18', color: '#f59e0b', border: '1px solid #f59e0b44', borderRadius: 4, padding: '2px 7px', fontWeight: 800, letterSpacing: '.06em' }}>NON SAUVEGARDÉ</span>}
                            </div>
                            <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                                <button onClick={reset} style={{ background: 'none', border: '1px solid #1e2530', borderRadius: 8, padding: '7px 12px', color: '#718096', fontSize: 12, cursor: 'pointer', transition: 'all .15s' }}
                                    onMouseEnter={e => { e.currentTarget.style.borderColor = '#4a5568'; e.currentTarget.style.color = '#e2e8f0'; }}
                                    onMouseLeave={e => { e.currentTarget.style.borderColor = '#1e2530'; e.currentTarget.style.color = '#718096'; }}>Reset</button>
                                <button onClick={save} style={{ background: '#00965E', border: 'none', borderRadius: 8, padding: '7px 16px', color: 'white', fontSize: 12, fontWeight: 700, cursor: 'pointer', transition: 'background .15s', letterSpacing: '.03em' }}
                                    onMouseEnter={e => e.currentTarget.style.background = '#007a4e'}
                                    onMouseLeave={e => e.currentTarget.style.background = '#00965E'}>Sauvegarder</button>
                                <button onClick={logout} title="Déconnexion" style={{ background: 'none', border: 'none', padding: '7px 8px', color: '#4a5568', cursor: 'pointer', borderRadius: 8, transition: 'color .15s', display: 'flex' }}
                                    onMouseEnter={e => e.currentTarget.style.color = '#ef4444'}
                                    onMouseLeave={e => e.currentTarget.style.color = '#4a5568'}>
                                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><polyline points="16 17 21 12 16 7" /><line x1="21" y1="12" x2="9" y2="12" /></svg>
                                </button>
                            </div>
                        </div>
                        <div style={{ maxWidth: 720, margin: '0 auto', padding: '0 20px', display: 'flex', gap: 2 }}>
                            {tabs.map(([id, lbl]) => (
                                <button key={id} onClick={() => setTab(id)} style={{ padding: '10px 16px', fontSize: 12, fontWeight: tab === id ? 700 : 500, color: tab === id ? '#00965E' : '#718096', background: 'none', border: 'none', cursor: 'pointer', borderBottom: `2px solid ${tab === id ? '#00965E' : 'transparent'}`, transition: 'all .15s', letterSpacing: '.02em' }}>
                                    {lbl}
                                </button>
                            ))}
                        </div>
                    </div>
                    <div style={{ maxWidth: 720, margin: '0 auto', padding: '24px 20px 60px' }}>
                        {tab === 'general' && <GeneralTab cfg={cfg} setCfg={setCfg} />}
                        {tab === 'accounts' && <AccountsTab cfg={cfg} setCfg={setCfg} />}
                        {tab === 'transfers' && <TransactionsTab cfg={cfg} setCfg={setCfg} />}
                    </div>
                    {toast && (
                        <div className="fade-in" style={{ position: 'fixed', bottom: 28, left: '50%', transform: 'translateX(-50%)', background: toast.color, color: 'white', padding: '11px 22px', borderRadius: 10, fontSize: 13, fontWeight: 600, boxShadow: '0 4px 24px rgba(0,0,0,.5)', whiteSpace: 'nowrap', zIndex: 9999 }}>
                            {toast.msg}
                        </div>
                    )}
                </div>
            );
        }
 
        function PasswordGate({ onAuth }) {
            const [pwd, setPwd] = useState('');
            const [err, setErr] = useState(false);
            const [shake, setShake] = useState(false);
 
            const check = () => {
                if (!pwd.trim()) return;
                fetch('/api/admin-auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pwd })
                }).then(r => r.json()).then(data => {
                    if (data.token) {
                        adminToken = data.token;
                        localStorage.setItem(ADMIN_AUTH_KEY, data.token);
                        onAuth();
                    } else {
                        setErr(true); setShake(true);
                        setTimeout(() => { setErr(false); setShake(false); setPwd(''); }, 700);
                    }
                }).catch(() => {
                    setErr(true); setShake(true);
                    setTimeout(() => { setErr(false); setShake(false); setPwd(''); }, 700);
                });
            };
 
            return (
                <div style={{ minHeight: '100vh', background: '#080b0f', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }}>
                    <div style={{ width: '100%', maxWidth: 360 }}>
                        <div style={{ textAlign: 'center', marginBottom: 32 }}>
                            <div style={{ width: 52, height: 52, background: '#00965E', borderRadius: 14, display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 16px' }}>
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></svg>
                            </div>
                            <h1 style={{ fontSize: 22, fontWeight: 800, color: '#e2e8f0', marginBottom: 6 }}>Admin Panel</h1>
                            <p style={{ fontSize: 13, color: '#4a5568' }}>Easy Banking</p>
                        </div>
                        <div style={{ background: '#0d1117', border: '1px solid #1e2530', borderRadius: 16, padding: 24 }}>
                            <div style={{ marginBottom: 14, animation: shake ? 'shake .55s ease' : 'none' }}>
                                <input
                                    type="password"
                                    value={pwd}
                                    onChange={e => { setPwd(e.target.value); setErr(false); }}
                                    onKeyDown={e => e.key === 'Enter' && check()}
                                    placeholder="Mot de passe"
                                    autoFocus
                                    style={{ width: '100%', background: '#080b0f', border: `1px solid ${err ? '#ef4444' : '#1e2530'}`, borderRadius: 10, padding: '13px 16px', color: '#e2e8f0', fontSize: 15, outline: 'none', transition: 'border-color .15s' }}
                                />
                            </div>
                            {err && <p style={{ fontSize: 12, color: '#ef4444', textAlign: 'center', marginBottom: 12 }}>Mot de passe incorrect</p>}
                            <button onClick={check} style={{ width: '100%', background: '#00965E', border: 'none', borderRadius: 10, padding: 13, color: 'white', fontSize: 15, fontWeight: 700, cursor: 'pointer', transition: 'background .15s', letterSpacing: '.02em' }}
                                onMouseEnter={e => e.currentTarget.style.background = '#007a4e'}
                                onMouseLeave={e => e.currentTarget.style.background = '#00965E'}>
                                Se connecter
                            </button>
                        </div>
                    </div>
                </div>
            );
        }
 
        function App() {
            const [authed, setAuthed] = useState(() => !!localStorage.getItem(ADMIN_AUTH_KEY));
            if (!authed) return <PasswordGate onAuth={() => setAuthed(true)} />;
            return <AdminPanel />;
        }
 
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    <script>
        (function () {
            var src = document.getElementById('app-source').textContent;
            var out = Babel.transform(src, {
                presets: [['react', { runtime: 'classic' }]]
            }).code;
            var s = document.createElement('script');
            s.textContent = out;
            document.body.appendChild(s);
        })();
    </script>
</body>
