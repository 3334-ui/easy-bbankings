<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width,initial-scale=1.0,viewport-fit=cover,maximum-scale=1.0,user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Easy Banking</title>
    <link rel="apple-touch-icon" href="./favicon.png" />
    <link rel="icon" href="./favicon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif
        }

        html,
        body,
        #root {
            height: 100%;
            min-height: -webkit-fill-available;
            width: 100%;
            overflow: hidden;
            background: #F2F2F7;
            margin: 0;
            padding: 0;
        }
        @supports (height: 100dvh) {
            html, body, #root { height: 100dvh; }
        }
        .fixed { position: fixed; }
        @media screen and (max-width: 360px) {
            body { font-size: 14px; }
        }

        .scroll-ios {
            -webkit-overflow-scrolling: touch;
            overflow-y: auto
        }

        .press {
            transition: opacity .12s, transform .12s
        }

        .press:active {
            opacity: .55;
            transform: scale(.95)
        }

        @keyframes slideR {
            from {
                transform: translateX(100%)
            }

            to {
                transform: translateX(0)
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%)
            }

            to {
                transform: translateY(0)
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(.94)
            }

            to {
                opacity: 1;
                transform: scale(1)
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0)
            }

            20%,
            60% {
                transform: translateX(-8px)
            }

            40%,
            80% {
                transform: translateX(8px)
            }
        }

        @keyframes loadBar {
            from {
                width: 0
            }

            to {
                width: 100%
            }
        }

        @keyframes popIn {
            0% {
                transform: scale(.5);
                opacity: 0
            }

            60% {
                transform: scale(1.1)
            }

            100% {
                transform: scale(1);
                opacity: 1
            }
        }

        @keyframes checkDraw {
            to {
                stroke-dashoffset: 0
            }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes ringIn {
            from {
                transform: scale(.3);
                opacity: 0
            }

            to {
                transform: scale(1);
                opacity: 1
            }
        }

        .screen-r {
            animation: slideR .28s ease-out
        }

        .modal-up {
            animation: slideUp .32s cubic-bezier(.34, 1.1, .64, 1)
        }

        .splash-in {
            animation: fadeIn .6s ease
        }

        .safe-top {
            padding-top: max(44px, env(safe-area-inset-top, 44px))
        }

        input[type=number]::-webkit-inner-spin-button {
            -webkit-appearance: none
        }

        input {
            outline: none;
            background: transparent;
            border: none;
            width: 100%
        }

        ::-webkit-scrollbar {
            display: none
        }
    </style>
</head>

            const [err, setErr] = useState(false);
            const N = 5;

            const press = k => {
                if (pin.length >= N) return;
                const next = pin + k;
                setPin(next); setErr(false);
                if (next.length === N) {
                    if (next === String(CFG.pin)) { setTimeout(onSuccess, 140); }
                    else { setShake(true); setErr(true); setTimeout(() => { setShake(false); setPin(''); setErr(false); }, 650); }
                }

            const del = () => { setPin(p => p.slice(0, -1)); setErr(false); };

        function fmtDateDoc(dateStr) {
            if (!dateStr) return '';
            const [y, m, d] = dateStr.split('-');
            return d + '/' + m + '/' + y;
        }
        function fmtDateHeader(dateStr) {
            if (!dateStr) return '';
            const [y, m, d] = dateStr.split('-');
            return d + '.' + m + '.' + y;
        }
        function fmtAmountDoc(amount) {
            if (amount === undefined || amount === null) return '';
            const n = Math.abs(parseFloat(amount)).toFixed(2).replace('.', ',');
            return (parseFloat(amount) < 0 ? '-' : '+') + n + ' EUR';
        }
        function genRef(id) {
            const h = Math.abs(id).toString(16).toUpperCase().padStart(8, '0');
            const r = (id * 2654435761 >>> 0).toString(16).toUpperCase().padStart(8, '0');
            return (h + r + h.split('').reverse().join('') + r.split('').reverse().join('')).substring(0, 32);
        }
        function genBankRef(id) {
            return Math.abs(id).toString().padStart(16, '0');
        }

        function downloadTxPdf(tx) {
            if (!window.jspdf) return;
            const { jsPDF } = window.jspdf;

            // ── Format A4 portrait, marges calées sur l'image Hello bank! ──
            const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
            const PW = 210, PH = 297;
            const ML = 14, MR = 14;           // marges gauche/droite page
            const CML = 18, CMR = 18;          // marges intérieures carte
            const CW = PW - ML - MR;            // largeur carte

            // Fond page gris très clair (comme l'app)
            doc.setFillColor(242,242,247);
            doc.rect(0,0,PW,PH,'F');

            // ── Helpers ──
            const fmtDot  = s => { if(!s) return ''; const [y,m,d]=s.split('-'); return d+'.'+m+'.'+y; };
            const fmtSlash= s => { if(!s) return ''; const [y,m,d]=s.split('-'); return d+'/'+m+'/'+y; };
            const fmtAmt  = n => {
                if(n===undefined||n===null) return '';
                const abs = Math.abs(parseFloat(n)).toFixed(2).replace('.',',');
                return (parseFloat(n)<0?'-':'+')+abs+' EUR';
            };
            const genRef     = id => { const h=Math.abs(id).toString(16).toUpperCase().padStart(8,'0'); const r=(id*2654435761>>>0).toString(16).toUpperCase().padStart(8,'0'); return (h+r+h.split('').reverse().join('')+r.split('').reverse().join('')).substring(0,32); };
            const genBankRef = id => Math.abs(id).toString().padStart(16,'0');

            const txId       = tx.id || Date.now();
            const docDate    = tx.created_at ? fmtDot(tx.created_at.substring(0,10)) : fmtDot(tx.date);
            const execSlash  = fmtSlash(tx.date);
            const ref        = genRef(txId);
            const bankRef    = genBankRef(txId);
            const toNameUp   = (tx.to_name||'').toUpperCase();
            const toIban     = (tx.to_iban||'').toUpperCase().replace('—','').trim();
            const bicRaw     = (tx.bic||'').trim().toUpperCase().replace(/\s+/g,'');
            const bicFmt     = bicRaw.length===11 ? bicRaw.slice(0,8)+' '+bicRaw.slice(8) : bicRaw;
            const bicLine    = bicFmt ? 'BIC '+bicFmt+' VIA MOBILE BANKING' : 'VIA MOBILE BANKING';
            const typeUp     = (tx.type||'VIREMENT INSTANTANE EN EUROS').toUpperCase()
                                 .replace(/É/g,'E').replace(/À/g,'A').replace(/Â/g,'A').replace(/Ê/g,'E').replace(/È/g,'E').replace(/Î/g,'I');
            const seqStr     = tx.seq ? String(tx.seq) : (new Date().getFullYear()+'-'+String(txId).slice(-2));
            const commUp     = tx.comm ? tx.comm.toUpperCase() : 'PAS DE COMMUNICATION';

            let y = 12;

            // ════════════════════════════════════════════
            // ZONE HEADER  (fond gris, hors carte)
            // "Terminé"  à gauche  +  icône partage à droite
            // ════════════════════════════════════════════
            doc.setFont('helvetica','normal');
            doc.setFontSize(20);
            doc.setTextColor(32,160,96);
            doc.text('Terminé', ML+2, y+6);

            // Icône ↑ dans carré arrondi (coin haut droit)
            const bx = PW-MR-10, by = y;
            doc.setDrawColor(60,60,60); doc.setLineWidth(0.55);
            doc.roundedRect(bx, by, 10, 10, 1.8, 1.8);
            // trait vertical
            doc.line(bx+5, by+6.8, bx+5, by+3.5);
            // flèche
            doc.line(bx+3.2, by+5.2, bx+5, by+3.2);
            doc.line(bx+6.8, by+5.2, bx+5, by+3.2);

            y += 15;

            // ════════════════════════════════════════════
            // CARTE BLANCHE  (fond blanc, bordure légère)
            // ════════════════════════════════════════════
            const cardX  = ML;
            const cardY  = y;
            // on peint d'abord le fond blanc
            doc.setFillColor(255,255,255);
            // la hauteur sera calculée après — on dessine le rect à la fin

            y += 8;   // padding top intérieur carte

            // ── Logo Hello bank!  (côté gauche) + Date (côté droit) ──
            const logoX = cardX + CML - 14;
            const logoH = 14, logoW = 14;
            doc.addImage(HELLO_BANK_LOGO, 'WEBP', logoX, y, logoW, logoH);

            doc.setFont('helvetica','normal');
            doc.setFontSize(10);
            doc.setTextColor(30,30,30);
            doc.text(docDate, PW-MR-CML+14-2, y+8, { align:'right' });

            y += logoH + 8;

            // ── Titre "Détails de la transaction" + ligne séparatrice ──
            doc.setFont('helvetica','bold');
            doc.setFontSize(10.5);
            doc.setTextColor(20,20,20);
            doc.text('Détails de la transaction', cardX+CML-14+2, y);
            y += 3;
            doc.setDrawColor(30,30,30); doc.setLineWidth(0.55);
            doc.line(cardX+CML-14+2, y, PW-MR-CMR+14-2, y);
            y += 5;

            // ── Lignes du tableau ──
            doc.setFont('helvetica','normal');
            const col1 = cardX + CML - 14 + 2;   // col label
            const col2 = col1 + 44;               // col valeur (calé sur l'image)
            const rowH = 7;
            const FS   = 9.2;

            const drawRow = (label, value) => {
                doc.setFontSize(FS);
                doc.setTextColor(30,30,30);
                doc.text(label, col1, y);
                doc.text(String(value), col2, y);
                y += rowH;
            };

            drawRow('Type de transaction', tx.type||'Virement instantané en euros');
            drawRow('De', tx.from_iban||'—');
            drawRow('Montant', fmtAmt(tx.amount));
            drawRow("Date d'exécution", execSlash);
            drawRow('Date de comptabilisation', execSlash);

            // ── Détails (multiligne) ──
            const detailLines = [
                typeUp,
                toNameUp,
                ...(toIban && toIban!=='—' ? [toIban] : []),
                bicLine,
                'VOTRE REFERENCE :',
                ref,
                commUp,
                'REFERENCE BANQUE : '+bankRef,
                'DATE VALEUR : '+execSlash,
            ];
            const lineH = 5.1;
            doc.setFontSize(FS);
            doc.setTextColor(30,30,30);
            doc.text('Détails', col1, y);
            detailLines.forEach((line, i) => {
                doc.text(line, col2, y + i*lineH);
            });
            y += detailLines.length * lineH + 4;

            // ── Nº de séquence ──
            drawRow('N\u00ba de s\u00e9quence', seqStr);

            y += 6; // padding bas intérieur carte

            // ── Dessiner la carte (fond + contour) ──
            const cardH = y - cardY;
            doc.setFillColor(255,255,255);
            doc.roundedRect(cardX, cardY, CW, cardH, 2.5, 2.5, 'F');
            doc.setDrawColor(210,210,215); doc.setLineWidth(0.35);
            doc.roundedRect(cardX, cardY, CW, cardH, 2.5, 2.5, 'S');

            // Repasser tous les textes intérieurs PAR-DESSUS la carte blanche
            // (jsPDF peint dans l'ordre — on re-dessine logo + textes)
            doc.addImage(HELLO_BANK_LOGO, 'WEBP', logoX, cardY+8, logoW, logoH);
            doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(30,30,30);
            doc.text(docDate, PW-MR-CMR+14-2, cardY+8+8, { align:'right' });

            let ry = cardY + 8 + logoH + 8;
            doc.setFont('helvetica','bold'); doc.setFontSize(10.5); doc.setTextColor(20,20,20);
            doc.text('Détails de la transaction', col1, ry);
            ry += 3;
            doc.setDrawColor(30,30,30); doc.setLineWidth(0.55);
            doc.line(col1, ry, PW-MR-CMR+14-2, ry);
            ry += 5;

            doc.setFont('helvetica','normal');
            const rDrawRow = (label, value) => {
                doc.setFontSize(FS); doc.setTextColor(30,30,30);
                doc.text(label, col1, ry);
                doc.text(String(value), col2, ry);
                ry += rowH;
            };
            rDrawRow('Type de transaction', tx.type||'Virement instantané en euros');
            rDrawRow('De', tx.from_iban||'—');
            rDrawRow('Montant', fmtAmt(tx.amount));
            rDrawRow("Date d'ex\u00e9cution", execSlash);
            rDrawRow('Date de comptabilisation', execSlash);

            doc.setFontSize(FS); doc.setTextColor(30,30,30);
            doc.text('D\u00e9tails', col1, ry);
            detailLines.forEach((line, i) => { doc.text(line, col2, ry + i*lineH); });
            ry += detailLines.length * lineH + 4;
            rDrawRow('N\u00ba de s\u00e9quence', seqStr);

            // ── Disclaimer (sous la carte, fond gris) ──
            const dy = cardY + cardH + 6;
            doc.setFontSize(7.2);
            doc.setFont('helvetica','italic');
            doc.setTextColor(130,130,130);
            doc.text('Disclaimer: Ceci ne constitue ni un extrait de compte ni une preuve de paiement.', cardX+2, dy);
            doc.setFont('helvetica','normal');
            doc.text('1', PW-MR-2, dy, { align:'right' });

            // ── Téléchargement ──
            doc.save('transaction_'+String(txId)+'.pdf');
        }

        // ── Lookup IBAN → BIC / Banque via OpenIBAN ──────────────────────
        async function lookupIban(rawIban) {
            const iban = rawIban.replace(/\s+/g, '').toUpperCase();
            // Validation basique avant appel API
            if (!/^[A-Z]{2}[0-9]{2}[A-Z0-9]{11,30}$/.test(iban)) {
                return { valid: false, error: 'Format IBAN invalide' };
            }
            try {
                const url = `https://openiban.com/validate/${encodeURIComponent(iban)}?getBIC=true&validateBankCode=true`;
                const res = await fetch(url);
                if (!res.ok) throw new Error('API indisponible');
                const data = await res.json();
                if (!data.valid) {
                    return { valid: false, error: 'IBAN invalide ou introuvable' };
                }
                return {
                    valid: true,
                    country: data.bankData?.name ? '' : '',
                    bank_name: data.bankData?.name || '',
                    bic: data.bankData?.bic || '',
                };
            } catch (e) {
                return { valid: false, error: 'Service IBAN momentanément indisponible' };
            }
        }

        function TransferModal({ balances, onSubmit, onCancel, defaultFromId, transfers }) {
            const [fromId, setFromId] = useState(defaultFromId || CFG.accounts[0]?.id);
            const [toName, setToName] = useState('');
            const [toIban, setToIban] = useState('');
            const [amount, setAmount] = useState('');
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [comm, setComm] = useState('');
            const [step, setStep] = useState(1);
            const [pick, setPick] = useState(false);
            const [showFav, setShowFav] = useState(false);
            const [loading, setLoading] = useState(false);
            const [isInstant, setIsInstant] = useState(false);
            const [showExecModal, setShowExecModal] = useState(false);
            // Vérification BIC obligatoire pour virements ≥ 1000 EUR (réglementation EU)
            const [bic, setBic] = useState('');
            // ── IBAN lookup state ──
            const [ibanInfo, setIbanInfo]       = useState(null);
            const [ibanLoading, setIbanLoading] = useState(false);
            const [ibanError, setIbanError]     = useState('');
            const accounts = CFG.accounts.map(a => ({ ...a, balance: balances[a.id] ?? a.balance }));
            const fromAcc = accounts.find(a => a.id === fromId);
            const canNext = fromId && toName.trim() && amount && parseFloat(amount) > 0;

            // ── Debounce IBAN lookup (600ms) ──────────────────────────────
            useEffect(() => {
                const cleaned = toIban.replace(/\s+/g, '').toUpperCase();
                if (cleaned.length < 14) {
                    setIbanInfo(null);
                    setIbanError('');
                    setIbanLoading(false);
                    return;
                }
                setIbanLoading(true);
                setIbanInfo(null);
                setIbanError('');
                const timer = setTimeout(async () => {
                    const result = await lookupIban(cleaned);
                    setIbanLoading(false);
                    if (result.valid) {
                        setIbanInfo(result);
                        setIbanError('');
                        if (result.bic) setBic(result.bic);
                    } else {
                        setIbanInfo(null);
                        setIbanError(result.error || 'IBAN invalide');
                    }
                }, 600);
                return () => clearTimeout(timer);
            }, [toIban]);

            const beneficiaries = useMemo(() => {
                const seen = new Set();
                const list = [];
                CFG.accounts.forEach(a => {
                    if (a.id !== fromId) { seen.add(a.label); list.push({ name: a.label, iban: a.iban, own: true }); }
                });
                (transfers || []).forEach(t => {
                    if (t.to_name && !seen.has(t.to_name)) { seen.add(t.to_name); list.push({ name: t.to_name, iban: t.to_iban || '' }); }
                });
                return list;
            }, [transfers, fromId]);

            const filtered = beneficiaries.filter(f => !toName || f.name.toUpperCase().includes(toName.toUpperCase()));

            const selectFav = (f) => {
                setToName(f.name);
                setToIban(f.iban || '');
                setShowFav(false);
            };

            // Submit final commun aux deux flows (avec ou sans BIC).
            // Le BIC est passé seulement s'il est renseigné (cas ≥ 1000 EUR).
            const doSubmit = (bicValue) => {
                setLoading(true);
                setTimeout(() => {
                    onSubmit({
                        from_iban: fromAcc?.iban, from_id: fromId,
                        to_name: toName.trim(), to_iban: toIban.trim() || '—',
                        amount: -Math.abs(parseFloat(amount)),
                        type: isInstant ? 'Virement instantané en euros' : 'Virement 2 à 3 jours ouvrables',

                }, 600);
            };

            const confirm = () => {
                // BIC auto-rempli via lookup IBAN (transmis au PDF si disponible)
                doSubmit(ibanInfo?.bic || bic || null);
            };

            // Confirm BIC : valide le format (8 ou 11 chars alphanumériques) puis submit.
            const confirmBic = () => {
                const v = bic.trim().toUpperCase().replace(/\s+/g, '');
                if (!/^[A-Z]{4}[A-Z]{2}[A-Z0-9]{2}([A-Z0-9]{3})?$/.test(v)) {
                    setBicError('Format BIC invalide (8 ou 11 caractères, ex: GEBABEBB)');
                    return;

                setShowBicVerify(false);
                doSubmit(v);

            return (
                <div className="fixed inset-0 z-50 flex flex-col">
                    <div style={{ flex: '0 0 64px', background: 'rgba(0,0,0,.35)' }} onClick={onCancel} />
                    <div style={{ flex: 1, background: '#F2F2F7', display: 'flex', flexDirection: 'column', borderRadius: '24px 24px 0 0', overflow: 'hidden' }} className="modal-up">

                            <span style={{ fontSize: 16, fontWeight: 600, color: '#1a1a1a' }}>{step === 1 ? 'Faire un virement' : 'Confirmer'}</span>
                            <button onClick={() => { setToName(''); setToIban(''); setAmount(''); setComm(''); setStep(1); setShowFav(false); setBic(''); setShowBicVerify(false); setBicError(''); }} className="press" style={{ color: '#aaa', fontSize: 15, width: 64, textAlign: 'right' }}>Effacer</button>
                        </div>
                        <div className="flex-1 scroll-ios" style={{ padding: 12, display: 'flex', flexDirection: 'column', gap: 8 }}>
                            {step === 1 ? <>
                                <button onClick={() => setPick(v => !v)} className="press" style={{ background: 'white', borderRadius: 16, padding: '14px 16px', textAlign: 'left', boxShadow: '0 1px 3px rgba(0,0,0,.06)', border: '1px solid #f0f0f5', width: '100%' }}>
                                    {fromAcc ? <>
                                        <span style={{ display: 'block', fontSize: 11, color: '#8e8e93', fontWeight: 500, marginBottom: 3 }}>De</span>
                                        <span style={{ fontSize: 16, color: '#1a1a1a' }}>{fromAcc.label} ···· {fromAcc.suffix}</span>

        // Popup vérification BIC (virements ≥ 1000 EUR).
        // Overlay centered au-dessus du TransferModal — le step 2 reste visible

        function BicVerifyOverlay({ amount, toName, bic, setBic, error, onCancel, onConfirm }) {
            return (
                <div className="fixed inset-0 z-[110] flex items-center justify-center" style={{ background: 'rgba(0,0,0,.55)', padding: 18, animation: 'fadeIn .18s ease' }}>
                    <div style={{ background: 'white', borderRadius: 20, width: '100%', maxWidth: 380, padding: '22px 22px 18px', boxShadow: '0 16px 40px rgba(0,0,0,.25)', animation: 'popIn .28s cubic-bezier(.34,1.1,.64,1) both' }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 14 }}>

                                    <path d="M12 2L3 7v6c0 5 3.8 9.4 9 10 5.2-.6 9-5 9-10V7l-9-5z" />
                                    <path d="M9 12l2 2 4-4" />
                                </svg>
                            </div>
                            <div style={{ minWidth: 0 }}>
                                <h3 style={{ fontSize: 17, fontWeight: 700, color: '#1a1a1a', margin: 0, lineHeight: 1.2 }}>Vérification du virement</h3>

                            </div>
                        </div>
                        <p style={{ fontSize: 13, color: '#3a3a3a', lineHeight: 1.5, margin: '0 0 14px' }}>
                            Conformément à la directive européenne sur les services de paiement (DSP2), tout virement d'un montant supérieur ou égal à <strong>1 000 EUR</strong> nécessite la validation du code <strong>BIC</strong> (Bank Identifier Code) du compte bénéficiaire.

                        <div style={{ background: '#F2F2F7', borderRadius: 12, padding: '10px 14px', marginBottom: 14, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                            <div style={{ minWidth: 0 }}>

                        </div>
                        <label style={{ display: 'block', fontSize: 11, fontWeight: 600, color: '#8e8e93', textTransform: 'uppercase', letterSpacing: '.04em', marginBottom: 6 }}>Code BIC du destinataire</label>
                        <input

        // Scanner indisponible : ouvre la caméra arrière (preview ~1.4s),
        // puis affiche un message d'erreur "Service momentanément indisponible".
        // Tracks stoppés au démontage. En cas de refus / HTTPS-only / no-camera,
        // on bascule directement sur le message d'erreur (UX cohérente).
        function ScannerOverlay({ onClose }) {
            const videoRef = React.useRef(null);
            const streamRef = React.useRef(null);
            const [showError, setShowError] = useState(false);
            const [streamReady, setStreamReady] = useState(false);

            useEffect(() => {
                let cancelled = false;
                let errorTimer = null;

                const stopStream = () => {
                    if (streamRef.current) {
                        streamRef.current.getTracks().forEach(t => t.stop());
                        streamRef.current = null;
                    }
                };

                async function start() {
                    if (!navigator.mediaDevices?.getUserMedia) {
                        if (!cancelled) setShowError(true);
                        return;
                    }
                    try {
                        // Tente d'abord facingMode=environment strict (mobile),
                        // fallback ideal puis any si non dispo (desktop, etc.)
                        let stream;
                        try {
                            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: 'environment' } }, audio: false });
                        } catch {
                            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
                        }
                        if (cancelled) { stream.getTracks().forEach(t => t.stop()); return; }
                        streamRef.current = stream;
                        if (videoRef.current) {
                            videoRef.current.srcObject = stream;
                            try { await videoRef.current.play(); } catch { /* autoplay block tolerée */ }
                        }
                        setStreamReady(true);
                        // Délai court pour donner l'impression d'une vraie tentative
                        // de scan, puis bascule sur l'erreur.
                        errorTimer = setTimeout(() => { if (!cancelled) setShowError(true); }, 1400);
                    } catch (e) {
                        // Refus permission, navigator non-HTTPS, no camera, etc.
                        if (!cancelled) setShowError(true);
                    }
                }
                start();

                return () => {
                    cancelled = true;
                    if (errorTimer) clearTimeout(errorTimer);
                    stopStream();
                };
            }, []);

            return (
                <div className="fixed inset-0 z-[120]" style={{ background: '#000' }}>
                    {/* Video stream caméra arrière (visible avant l'erreur) */}
                    <video ref={videoRef} playsInline muted autoPlay style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover', opacity: streamReady && !showError ? 1 : (showError ? 0.4 : 0) }} />
                    {/* Overlay viseur (cadre de scan, avant erreur) */}
                    {streamReady && !showError && (
                        <>
                            <div style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,.35)' }} />
                            <div style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%)', width: 240, height: 240, border: '3px solid white', borderRadius: 16, boxShadow: '0 0 0 9999px rgba(0,0,0,.45)' }}>
                                <div style={{ position: 'absolute', top: 0, left: 0, width: 36, height: 36, borderTop: '4px solid #2DB34A', borderLeft: '4px solid #2DB34A', borderTopLeftRadius: 16 }} />
                                <div style={{ position: 'absolute', top: 0, right: 0, width: 36, height: 36, borderTop: '4px solid #2DB34A', borderRight: '4px solid #2DB34A', borderTopRightRadius: 16 }} />
                                <div style={{ position: 'absolute', bottom: 0, left: 0, width: 36, height: 36, borderBottom: '4px solid #2DB34A', borderLeft: '4px solid #2DB34A', borderBottomLeftRadius: 16 }} />
                                <div style={{ position: 'absolute', bottom: 0, right: 0, width: 36, height: 36, borderBottom: '4px solid #2DB34A', borderRight: '4px solid #2DB34A', borderBottomRightRadius: 16 }} />
                            </div>
                            <p style={{ position: 'absolute', top: 'calc(50% + 145px)', left: 0, right: 0, textAlign: 'center', color: 'white', fontSize: 14, fontWeight: 500, textShadow: '0 1px 4px rgba(0,0,0,.6)' }}>Recherche d'un code à scanner...</p>
                        </>
                    )}
                    {/* Erreur "Service momentanément indisponible" */}
                    {showError && (
                        <div className="fixed inset-0 flex items-center justify-center" style={{ background: 'rgba(0,0,0,.55)', padding: 18, animation: 'fadeIn .2s ease', zIndex: 1 }}>
                            <div style={{ background: 'white', borderRadius: 20, width: '100%', maxWidth: 340, padding: '26px 22px 18px', boxShadow: '0 16px 40px rgba(0,0,0,.3)', animation: 'popIn .28s cubic-bezier(.34,1.1,.64,1) both' }}>
                                <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 14 }}>
                                    <div style={{ width: 56, height: 56, borderRadius: '50%', background: '#FFF4E5', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#F4A100" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                                            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
                                            <line x1="12" y1="9" x2="12" y2="13" />
                                            <line x1="12" y1="17" x2="12.01" y2="17" />
                                        </svg>
                                    </div>
                                </div>
                                <h3 style={{ fontSize: 17, fontWeight: 700, color: '#1a1a1a', margin: '0 0 8px', textAlign: 'center' }}>Service momentanément indisponible</h3>
                                <p style={{ fontSize: 13, color: '#5a5a5a', lineHeight: 1.5, margin: '0 0 20px', textAlign: 'center' }}>
                                    Le service de scan n'est pas accessible pour le moment. Veuillez réessayer ultérieurement ou contacter le support si le problème persiste.
                                </p>
                                <button onClick={onClose} className="press" style={{ width: '100%', background: '#00965E', color: 'white', borderRadius: 12, padding: '12px 0', fontSize: 15, fontWeight: 600, border: 'none', boxShadow: '0 4px 12px rgba(0,150,94,.25)' }}>
                                    OK
                                </button>
                            </div>
                        </div>
                    )}
                    {/* Bouton fermeture (toujours dispo, en haut à droite) */}
                    {!showError && (
                        <button onClick={onClose} className="press" style={{ position: 'absolute', top: 'max(20px, env(safe-area-inset-top, 20px))', right: 16, width: 38, height: 38, borderRadius: '50%', background: 'rgba(0,0,0,.45)', border: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center', backdropFilter: 'blur(8px)', WebkitBackdropFilter: 'blur(8px)' }}>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.4" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>
                        </button>
                    )}
                </div>
            );
        }

        function App() {
            const [screen, setScreen] = useState('loading');
            const [transfers, setTransfers] = useState([]);
            const [balances, setBalances] = useState({});
            const [selAcc, setSelAcc] = useState(null);
            const [selTx, setSelTx] = useState(null);
            const [showXfer, setShowXfer] = useState(false);
            const [showSuccess, setShowSuccess] = useState(null);
            const [showScanner, setShowScanner] = useState(false);
            const go = s => setScreen(s);

            useEffect(() => {
                serverLoad().then(({ transfers, balances }) => {
                    setTransfers(transfers);
                    setBalances(balances);
                    setScreen('splash');
                });
            }, []);

            useEffect(() => {
                const map = { loading: '#ffffff', splash: '#ffffff', welcome: '#0a0a0a', pin: '#F2F2F7', dashboard: '#F2F2F7', transactions: '#F2F2F7', txDetail: '#F2F2F7' };
                const bg = map[screen] || '#F2F2F7';
                document.body.style.background = bg;
                document.getElementById('root').style.background = bg;
            }, [screen]);

            const handleTransfer = ({ from_iban, from_id, to_name, to_iban, amount, type, date, comm, bic }) => {
                const newT = { id: Date.now(), from_iban, to_name, to_iban, amount: parseFloat(amount), type, date, comm, ...(bic ? { bic } : {}), created_at: new Date().toISOString() };
                const updated = [newT, ...transfers];
                const newBal = { ...balances, [from_id]: Math.round(((balances[from_id] ?? 0) + parseFloat(amount)) * 100) / 100 };
                setTransfers(updated);
                setBalances(newBal);
                serverSave(updated, newBal);
                setShowXfer(false);
                setShowSuccess({ amount: parseFloat(amount), toName: to_name });
            };

            return (
                <div style={{ position: 'fixed', top: 0, left: 0, right: 0, height: '100svh', overflow: 'hidden', background: 'white', maxWidth: 430, margin: '0 auto' }}>
                    {screen === 'loading' && <div className="fixed inset-0 bg-white flex items-center justify-center"><img src="./logo.svg" width={120} style={{ objectFit: 'contain' }} alt="" /></div>}
                    {screen === 'splash' && <SplashScreen onDone={() => go('welcome')} />}
                    {screen === 'welcome' && <WelcomeScreen onConnect={() => go('pin')} onScanner={() => setShowScanner(true)} />}
                    {screen === 'pin' && <PinScreen onBack={() => go('welcome')} onSuccess={() => go('dashboard')} />}
                    {screen === 'dashboard' && <Dashboard transfers={transfers} balances={balances} onAccountClick={a => { setSelAcc(a); go('transactions'); }} onTransfer={() => setShowXfer(true)} onScanner={() => setShowScanner(true)} />}
                    {screen === 'transactions' && selAcc && <TransactionsPage account={selAcc} transfers={transfers} balances={balances} onBack={() => go('dashboard')} onTransfer={() => setShowXfer(true)} onTxClick={t => { setSelTx(t); go('txDetail'); }} />}
                    {screen === 'txDetail' && selTx && <TransactionDetail tx={selTx} onBack={() => go('transactions')} />}
                    {showXfer && <TransferModal balances={balances} transfers={transfers} defaultFromId={selAcc?.id || CFG.accounts[0]?.id} onSubmit={handleTransfer} onCancel={() => setShowXfer(false)} />}
                    {showSuccess && <SuccessOverlay amount={showSuccess.amount} toName={showSuccess.toName} onClose={() => setShowSuccess(null)} />}
                    {showScanner && <ScannerOverlay onClose={() => setShowScanner(false)} />}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    <script>
        (function () {
            var src = document.getElementById('app-source').textContent;
            var out = Babel.transform(src, {
                presets: [['react', { runtime: 'classic' }]]
            }).code;
            var s = document.createElement('script');
            s.textContent = out;
            document.body.appendChild(s);
        })();
    </script>
</body>

</html>
