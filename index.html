<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width,initial-scale=1.0,viewport-fit=cover,maximum-scale=1.0,user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Easy Banking</title>
    <link rel="apple-touch-icon" href="./favicon.png" />
    <link rel="icon" href="./icon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif
        }

        html,
        body,
        #root {
            height: 100%;
            min-height: -webkit-fill-available;
            width: 100%;
            overflow: hidden;
            background: #F2F2F7;
            margin: 0;
            padding: 0;
        }
        @supports (height: 100dvh) {
            html, body, #root { height: 100dvh; }
        }
        .fixed { position: fixed; }
        @media screen and (max-width: 360px) {
            body { font-size: 14px; }
        }

        .scroll-ios {
            -webkit-overflow-scrolling: touch;
            overflow-y: auto
        }

        .press {
            transition: opacity .12s, transform .12s
        }

        .press:active {
            opacity: .55;
            transform: scale(.95)
        }

        @keyframes slideR {
            from {
                transform: translateX(100%)
            }

            to {
                transform: translateX(0)
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%)
            }

            to {
                transform: translateY(0)
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(.94)
            }

            to {
                opacity: 1;
                transform: scale(1)
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0)
            }

            20%,
            60% {
                transform: translateX(-8px)
            }

            40%,
            80% {
                transform: translateX(8px)
            }
        }

        @keyframes loadBar {
            from {
                width: 0
            }

            to {
                width: 100%
            }
        }

        @keyframes popIn {
            0% {
                transform: scale(.5);
                opacity: 0
            }

            60% {
                transform: scale(1.1)
            }

            100% {
                transform: scale(1);
                opacity: 1
            }
        }

        @keyframes checkDraw {
            to {
                stroke-dashoffset: 0
            }
        }

        @keyframes ringIn {
            from {
                transform: scale(.3);
                opacity: 0
            }

            to {
                transform: scale(1);
                opacity: 1
            }
        }

        .screen-r {
            animation: slideR .28s ease-out
        }

        .modal-up {
            animation: slideUp .32s cubic-bezier(.34, 1.1, .64, 1)
        }

        .splash-in {
            animation: fadeIn .6s ease
        }

        .safe-top {
            padding-top: max(44px, env(safe-area-inset-top, 44px))
        }

        input[type=number]::-webkit-inner-spin-button {
            -webkit-appearance: none
        }

        input {
            outline: none;
            background: transparent;
            border: none;
            width: 100%
        }

        ::-webkit-scrollbar {
            display: none
        }
    </style>
</head>

                { id: 10, from_iban: "BE39 0004 6429 2419", to_name: "PROXIMUS", to_iban: "BE44 0689 0123 4567", amount: -29.00, type: "Domiciliation", date: "2025-01-15", seq: 16 }
            ]
        };

        let CFG = DEFAULT_CFG;

        const fmt = n => new Intl.NumberFormat('fr-BE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n);
        const fmtSigned = n => { const s = fmt(Math.abs(n)); return n < 0 ? `–${s}` : `+${s}`; };
        const fmtLong = str => new Date(str + 'T12:00:00').toLocaleDateString('fr-BE', { day: 'numeric', month: 'long', year: 'numeric' });
        const fmtDayMon = str => { const d = new Date(str + 'T12:00:00'); return { day: d.getDate(), mon: d.toLocaleDateString('fr-BE', { month: 'short' }).replace('.', '') }; };

        async function serverLoad() {
            try {
                const [cfgRes, stateRes] = await Promise.all([
                    fetch('/api/cfg').catch(() => null),
                    fetch('/api/state').catch(() => null)
                ]);
                const cfgJson = cfgRes && cfgRes.ok ? await cfgRes.json() : null;
                if (cfgJson && cfgJson.accounts && cfgJson.pin) CFG = cfgJson;
                const stateJson = stateRes && stateRes.ok ? await stateRes.json() : null;
                const transfers = (stateJson && stateJson.transfers) ? stateJson.transfers : CFG.seedTransfers;
                const initBal = {};
                CFG.accounts.forEach(a => { initBal[a.id] = a.balance; });
                const balances = (stateJson && stateJson.balances) ? { ...initBal, ...stateJson.balances } : initBal;
                return { transfers, balances };
            } catch (e) {
                const initBal = {};
                CFG.accounts.forEach(a => { initBal[a.id] = a.balance; });
                return { transfers: CFG.seedTransfers, balances: initBal };
            }
        }

        let _pendingSave = null;
        function serverSave(transfers, balances) {
            if (_pendingSave) clearTimeout(_pendingSave);
            _pendingSave = setTimeout(() => {
                fetch('/api/state', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ transfers, balances }) }).catch(e => console.warn('Save failed:', e));
            }, 400);
        }

                                {

        function PinScreen({ onBack, onSuccess }) {
            const [pin, setPin] = useState('');
            const [shake, setShake] = useState(false);
            const [err, setErr] = useState(false);
            const N = 5;

            const press = k => {
                if (pin.length >= N) return;
                const next = pin + k;
                setPin(next); setErr(false);
                if (next.length === N) {
                    if (next === String(CFG.pin)) { setTimeout(onSuccess, 140); }
                    else { setShake(true); setErr(true); setTimeout(() => { setShake(false); setPin(''); setErr(false); }, 650); }
                }
            };
            const del = () => { setPin(p => p.slice(0, -1)); setErr(false); };

            return (
                <div className="fixed inset-0 flex flex-col screen-r" style={{ background: '#F2F2F7' }}>

                        </button>

                        {Array.from({ length: N }).map((_, i) => (

                                ? <span key={i} style={{ display: 'inline-block', width: 14, height: 14, borderRadius: '50%', background: err ? '#E53935' : '#1a1a1a', transition: 'background .15s' }} />
                                : <span key={i} style={{ display: 'inline-block', width: 30, height: 3, borderRadius: 2, background: err ? '#E53935' : '#C0C0C8', transition: 'background .15s' }} />
                        ))}
                    </div>
                    <div className="flex-1" />
                    <div className="px-5">
                        {[['1', '2', '3'], ['4', '5', '6'], ['7', '8', '9']].map((row, ri) => (
                            <div key={ri} className="grid grid-cols-3 mb-1">
                                {row.map(k => (
                                    <button key={k} onPointerDown={() => press(k)} className="press flex items-center justify-center" style={{ height: 72 }}>
                                        <span style={{ fontSize: 36, fontWeight: 300, color: '#00965E', lineHeight: 1 }}>{k}</span>
                                    </button>
                                ))}
                            </div>
                        ))}
                        <div className="grid grid-cols-3 mb-1">
                            <div />
                            <button onPointerDown={() => press('0')} className="press flex items-center justify-center" style={{ height: 72 }}>
                                <span style={{ fontSize: 36, fontWeight: 300, color: '#00965E', lineHeight: 1 }}>0</span>
                            </button>
                            <button onPointerDown={del} className="press flex items-center justify-center" style={{ height: 72 }}>
                                <svg width="26" height="20" viewBox="0 0 26 20" fill="none"><path d="M10 1H24a1.5 1.5 0 011.5 1.5v15A1.5 1.5 0 0124 19H10L1 10z" stroke="#1a1a1a" strokeWidth="1.6" strokeLinejoin="round" /><path d="M17 7l-5 6M12 7l5 6" stroke="#1a1a1a" strokeWidth="1.6" strokeLinecap="round" /></svg>
                            </button>
                        </div>
                        <div className="text-center pt-1" style={{ paddingBottom: 'max(12px, env(safe-area-inset-bottom, 12px))' }}>
                            <button className="press" style={{ color: '#00965E', fontSize: 15 }}>Code oublié ?</button>
                        </div>
                    </div>
                    <div className="flex justify-center pb-2"><div style={{ width: 112, height: 4, borderRadius: 2, background: 'rgba(0,0,0,.15)' }} /></div>
                </div>
            );
        }

        function Dashboard({ transfers, balances, onAccountClick, onTransfer, onScanner }) {
            const accounts = CFG.accounts.map(a => ({ ...a, balance: balances[a.id] ?? a.balance }));
            const recent = transfers.slice(0, 3);
            const actions = [
                {
                    bg: '#2DB34A', label: 'Virement', onClick: onTransfer, icon: (
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">

                            <polyline points="5 12 12 5 19 12" />
                        </svg>
                    )
                },
                {

        function fmtDateDoc(dateStr) {
            if (!dateStr) return '';
            const [y, m, d] = dateStr.split('-');
            return d + '/' + m + '/' + y;
        }
        function fmtDateHeader(dateStr) {
            if (!dateStr) return '';
            const [y, m, d] = dateStr.split('-');
            return d + '.' + m + '.' + y;
        }
        function fmtAmountDoc(amount) {
            if (amount === undefined || amount === null) return '';
            const n = Math.abs(parseFloat(amount)).toFixed(2).replace('.', ',');
            return (parseFloat(amount) < 0 ? '-' : '+') + n + ' EUR';
        }
        function genRef(id) {
            const h = Math.abs(id).toString(16).toUpperCase().padStart(8, '0');
            const r = (id * 2654435761 >>> 0).toString(16).toUpperCase().padStart(8, '0');
            return (h + r + h.split('').reverse().join('') + r.split('').reverse().join('')).substring(0, 32);
        }
        function genBankRef(id) {
            return Math.abs(id).toString().padStart(16, '0');
        }

        function DatePickerModal({ value, onChange, onClose }) {
            const initial = value ? new Date(value + 'T12:00:00') : new Date();
            const [year, setYear] = useState(initial.getFullYear());
            const [month, setMonth] = useState(initial.getMonth());
            const [day, setDay] = useState(initial.getDate());

            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDay = new Date(year, month, 1).getDay();
            const adjustedFirst = firstDay === 0 ? 6 : firstDay - 1; // lundi=0
            const today = new Date();

            const confirm = () => {
                const d = Math.min(day, daysInMonth);
                const pad = n => String(n).padStart(2, '0');
                onChange(`${year}-${pad(month + 1)}-${pad(d)}`);
                onClose();
            };

            const cells = [];
            for (let i = 0; i < adjustedFirst; i++) cells.push(null);
            for (let i = 1; i <= daysInMonth; i++) cells.push(i);

                <div className="fixed inset-0 z-[60] flex flex-col">
                    <div style={{ flex: 1, background: 'rgba(0,0,0,.4)' }} onClick={onClose} />
                    <div style={{ background: 'white', borderRadius: '20px 20px 0 0', paddingBottom: 'max(24px,env(safe-area-inset-bottom,24px))' }} className="modal-up">

                            <button onClick={confirm} style={{ color: '#00965E', fontSize: 15, fontWeight: 600 }} className="press">OK</button>
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '4px 16px 12px' }}>
                            <button onClick={() => { if (month === 0) { setMonth(11); setYear(y => y - 1); } else setMonth(m => m - 1); }} className="press" style={{ color: '#00965E', padding: '6px 12px', fontSize: 20 }}>‹</button>
                            <span style={{ fontSize: 15, fontWeight: 600, color: '#1a1a1a' }}>{MONTHS_FR[month]} {year}</span>
                            <button onClick={() => { if (month === 11) { setMonth(0); setYear(y => y + 1); } else setMonth(m => m + 1); }} className="press" style={{ color: '#00965E', padding: '6px 12px', fontSize: 20 }}>›</button>

                                <div key={i} style={{ fontSize: 11, color: '#8e8e93', fontWeight: 600, paddingBottom: 6 }}>{d}</div>

                            {cells.map((d, i) => (

                                    background: d === day && d ? '#00965E' : 'transparent',
                                    color: d === day && d ? 'white' : d ? '#1a1a1a' : 'transparent',

                    </div>

            );

        function TransferModal({ balances, onSubmit, onCancel, defaultFromId, transfers }) {
            const [fromId, setFromId] = useState(defaultFromId || CFG.accounts[0]?.id);
            const [toName, setToName] = useState('');
            const [toIban, setToIban] = useState('');
            const [amount, setAmount] = useState('');
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [comm, setComm] = useState('');
            const [step, setStep] = useState(1);
            const [pick, setPick] = useState(false);
            const [showFav, setShowFav] = useState(false);
            const [loading, setLoading] = useState(false);
            const [isInstant, setIsInstant] = useState(false);
            const [showExecModal, setShowExecModal] = useState(false);
            // Vérification BIC obligatoire pour virements ≥ 1000 EUR (réglementation EU)
            const [showBicVerify, setShowBicVerify] = useState(false);
            const [bic, setBic] = useState('');
            const [bicError, setBicError] = useState('');
            const accounts = CFG.accounts.map(a => ({ ...a, balance: balances[a.id] ?? a.balance }));
            const fromAcc = accounts.find(a => a.id === fromId);
            const canNext = fromId && toName.trim() && amount && parseFloat(amount) > 0;
            const requiresBic = parseFloat(amount) >= 1000;

            const beneficiaries = useMemo(() => {
                const seen = new Set();
                const list = [];
                CFG.accounts.forEach(a => {
                    if (a.id !== fromId) { seen.add(a.label); list.push({ name: a.label, iban: a.iban, own: true }); }
                });
                (transfers || []).forEach(t => {
                    if (t.to_name && !seen.has(t.to_name)) { seen.add(t.to_name); list.push({ name: t.to_name, iban: t.to_iban || '' }); }
                });
                return list;
            }, [transfers, fromId]);

            const filtered = beneficiaries.filter(f => !toName || f.name.toUpperCase().includes(toName.toUpperCase()));

            const selectFav = (f) => {
                setToName(f.name);
                setToIban(f.iban || '');
                setShowFav(false);
            };

            // Submit final commun aux deux flows (avec ou sans BIC).
            // Le BIC est passé seulement s'il est renseigné (cas ≥ 1000 EUR).
            const doSubmit = (bicValue) => {
                setLoading(true);
                setTimeout(() => {
                    onSubmit({
                        from_iban: fromAcc?.iban, from_id: fromId,
                        to_name: toName.trim(), to_iban: toIban.trim() || '—',
                        amount: -Math.abs(parseFloat(amount)),
                        type: isInstant ? 'Virement instantané en euros' : 'Virement 2 à 3 jours ouvrables',
                        date, comm: comm.trim(),
                        ...(bicValue ? { bic: bicValue } : {}),
                    });
                }, 600);
            };

            const confirm = () => {
                // Si virement ≥ 1000 EUR : on n'envoie PAS encore — on ouvre la
                // popup BIC par-dessus le step 2 (les champs restent visibles
                // derrière, conformément à la demande "ne pas supprimer les infos").
                if (requiresBic) {
                    setBicError('');
                    setShowBicVerify(true);
                    return;
                }
                doSubmit(null);
            };

            // Confirm BIC : valide le format (8 ou 11 chars alphanumériques) puis submit.
            const confirmBic = () => {
                const v = bic.trim().toUpperCase().replace(/\s+/g, '');
                if (!/^[A-Z]{4}[A-Z]{2}[A-Z0-9]{2}([A-Z0-9]{3})?$/.test(v)) {
                    setBicError('Format BIC invalide (8 ou 11 caractères, ex: GEBABEBB)');
                    return;
                }
                setShowBicVerify(false);
                doSubmit(v);
            };

            return (
                <div className="fixed inset-0 z-50 flex flex-col">
                    <div style={{ flex: '0 0 64px', background: 'rgba(0,0,0,.35)' }} onClick={onCancel} />
                    <div style={{ flex: 1, background: '#F2F2F7', display: 'flex', flexDirection: 'column', borderRadius: '24px 24px 0 0', overflow: 'hidden' }} className="modal-up">
                        <div style={{ display: 'flex', justifyContent: 'center', padding: '8px 0 4px' }}><div style={{ width: 40, height: 4, borderRadius: 2, background: '#d0d0d5' }} /></div>
                        <div style={{ background: 'white', display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '10px 16px', borderBottom: '1px solid #f0f0f5' }}>
                            <button onClick={onCancel} className="press" style={{ color: '#00965E', fontSize: 15, width: 64 }}>Annuler</button>

                            <button onClick={() => { setToName(''); setToIban(''); setAmount(''); setComm(''); setStep(1); setShowFav(false); setBic(''); setShowBicVerify(false); setBicError(''); }} className="press" style={{ color: '#aaa', fontSize: 15, width: 64, textAlign: 'right' }}>Effacer</button>
                        </div>
                        <div className="flex-1 scroll-ios" style={{ padding: 12, display: 'flex', flexDirection: 'column', gap: 8 }}>
                            {step === 1 ? <>
                                <button onClick={() => setPick(v => !v)} className="press" style={{ background: 'white', borderRadius: 16, padding: '14px 16px', textAlign: 'left', boxShadow: '0 1px 3px rgba(0,0,0,.06)', border: '1px solid #f0f0f5', width: '100%' }}>
                                    {fromAcc ? <>
                                        <span style={{ display: 'block', fontSize: 11, color: '#8e8e93', fontWeight: 500, marginBottom: 3 }}>De</span>

                                    </> : <span style={{ fontSize: 16, color: '#8e8e93' }}>De</span>}

                                {pick && (
                                    <div style={{ background: 'white', borderRadius: 16, overflow: 'hidden', boxShadow: '0 1px 3px rgba(0,0,0,.06)', border: '1px solid #f0f0f5' }}>

                                                <span style={{ fontSize: 14, fontWeight: 500, color: '#1a1a1a' }}>{a.label} ···· {a.suffix}</span>

                                <div style={{ background: 'white', borderRadius: 16, boxShadow: '0 1px 3px rgba(0,0,0,.06)', border: '1px solid #f0f0f5', overflow: 'visible' }}>
                                    <div style={{ padding: '14px 16px', borderBottom: toIban ? '1px solid #f0f0f5' : 'none' }}>
                                        {toName ? <div style={{ fontSize: 11, color: '#8e8e93', fontWeight: 500, marginBottom: 3 }}>Vers (bénéficiaire)</div> : null}
                                        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                            <input

                                                onChange={e => { setToName(e.target.value); setShowFav(true); }}

                                                onBlur={() => setTimeout(() => setShowFav(false), 200)}

                                            />
                                            {beneficiaries.length > 0 && (
                                                <button onPointerDown={e => { e.preventDefault(); setShowFav(v => !v); }} style={{ color: showFav ? '#00965E' : '#bbb', fontSize: 18, lineHeight: 1, flexShrink: 0, background: 'none', border: 'none', padding: '0 2px', cursor: 'pointer' }}>★</button>

                                    </div>
                                </div>

                                {showFav && filtered.length > 0 && (
                                    <div style={{ background: 'white', borderRadius: 16, overflow: 'hidden', boxShadow: '0 4px 16px rgba(0,0,0,.1)', border: '1px solid #f0f0f5' }}>

                                            <button key={i} onPointerDown={() => selectFav(f)} className="press w-full text-left" style={{ padding: '12px 16px', borderBottom: i < Math.min(filtered.length, 6) - 1 ? '1px solid #f0f0f5' : 'none', background: 'white', WebkitTapHighlightColor: 'transparent' }}>
                                                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                                                    <div style={{ width: 34, height: 34, borderRadius: '50%', background: f.own ? '#E8F5E9' : '#f5f5f5', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                                                        <span style={{ fontSize: 13, fontWeight: 700, color: f.own ? '#00965E' : '#888' }}>{f.name.charAt(0)}</span>
                                                    </div>
                                                    <div style={{ minWidth: 0 }}>
                                                        <p style={{ fontSize: 13, fontWeight: 600, color: '#1a1a1a', margin: 0 }} className="truncate">{f.name.toUpperCase()}</p>
                                                        {f.iban && <p style={{ fontSize: 11, color: '#aaa', margin: '2px 0 0' }} className="truncate">{f.iban}</p>}
                                                        {f.own && <span style={{ fontSize: 9, color: 'white', background: '#00965E', padding: '1px 5px', borderRadius: 3, fontWeight: 700 }}>MON COMPTE</span>}
                                                    </div>
                                                </div>
                                            </button>
                                        ))}
                                    </div>
                                )}

                                <TransferField lbl="Montant en EUR" val={amount} onChange={setAmount} type="number" />

                                {/* ── Bouton Date d'exécution ── */}
                                <button onClick={() => setShowExecModal(true)} className="press w-full text-left" style={{ background: 'white', borderRadius: 16, padding: '14px 16px', boxShadow: '0 1px 3px rgba(0,0,0,.06)', border: '1px solid #f0f0f5', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                                    <div>
                                        <div style={{ fontSize: 11, color: '#8e8e93', fontWeight: 500, marginBottom: 3 }}>Date d'exécution</div>
                                        <div style={{ fontSize: 16, color: '#1a1a1a', fontWeight: 500 }}>
                                            {isInstant ? "Aujourd'hui · Virement instantané" : new Date(date + 'T12:00:00').toLocaleDateString('fr-BE', { day: 'numeric', month: 'long', year: 'numeric' })}
                                        </div>
                                    </div>
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8e8e93" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                                </button>
                                {showExecModal && <ExecDateModal date={date} setDate={setDate} isInstant={isInstant} setIsInstant={setIsInstant} onClose={() => setShowExecModal(false)} />}

                                <TransferField lbl="Communication (optionnel)" val={comm} onChange={setComm} />
                            </> : (
                                <div style={{ background: 'white', borderRadius: 16, overflow: 'hidden', boxShadow: '0 1px 3px rgba(0,0,0,.06)', border: '1px solid #f0f0f5' }}>
                                    {[
                                        ['De', `${fromAcc?.label} ···· ${fromAcc?.suffix}`],
                                        ['Vers', toName.toUpperCase()],
                                        ['IBAN', toIban || '—'],
                                        ['Montant', `${amount} EUR`],
                                        ['Délai', isInstant ? 'Immédiat' : '2 à 3 jours ouvrables'],
                                        ['Date', isInstant ? "Aujourd'hui" : new Date(date + 'T12:00:00').toLocaleDateString('fr-BE', { day: 'numeric', month: 'long', year: 'numeric' })],
                                        ['Communication', comm || '—'],
                                    ].map(([k, v]) => (
                                        <div key={k} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '13px 16px', borderBottom: '1px solid #f0f0f5' }}>
                                            <span style={{ fontSize: 13, color: '#888', flexShrink: 0 }}>{k}</span>
                                            <span style={{ fontSize: 13, fontWeight: 600, color: k === 'Délai' && v === 'Immédiat' ? '#00965E' : '#1a1a1a', textAlign: 'right', maxWidth: '60%', wordBreak: 'break-word' }}>{v}</span>
                                        </div>
                                    ))}
                                    <div style={{ display: 'flex', justifyContent: 'space-between', padding: '14px 16px', background: '#E8F5E9' }}>
                                        <span style={{ fontSize: 16, fontWeight: 700, color: '#1a1a1a' }}>Total débité</span>
                                        <span style={{ fontSize: 20, fontWeight: 900, color: '#00965E' }}>-{amount} EUR</span>
                                    </div>
                                </div>
                            )}
                        </div>
                        <div style={{ padding: '12px 16px', background: '#F2F2F7', paddingBottom: 'max(24px, env(safe-area-inset-bottom, 24px))' }}>
                            {step === 1 ? (
                                <button onClick={() => canNext && setStep(2)} className="press w-full rounded-2xl py-4" style={{ background: canNext ? '#2DB34A' : '#e0e0e5', color: canNext ? 'white' : '#aaa', fontSize: 16, fontWeight: 600, boxShadow: canNext ? '0 4px 12px rgba(45,179,74,.3)' : 'none' }}>
                                    Suivant
                                </button>
                            ) : <>
                                <button onClick={confirm} disabled={loading} className="press w-full rounded-2xl py-4 flex items-center justify-center gap-2" style={{ background: '#2DB34A', color: 'white', fontSize: 16, fontWeight: 600, boxShadow: '0 4px 12px rgba(45,179,74,.3)' }}>
                                    {loading
                                        ? <><div style={{ width: 20, height: 20, border: '2px solid white', borderTopColor: 'transparent', borderRadius: '50%' }} className="animate-spin" />En cours...</>
                                        : <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.2"><path d="M20 6L9 17l-5-5" /></svg>Confirmer le virement</>
                                    }
                                </button>
                                <button onClick={() => setStep(1)} className="press w-full py-3 mt-1" style={{ color: '#00965E', fontSize: 14 }}>← Modifier</button>
                            </>}
                        </div>
                    </div>
                    {showBicVerify && (
                        <BicVerifyOverlay
                            amount={amount}
                            toName={toName}
                            bic={bic}
                            setBic={(v) => { setBic(v); if (bicError) setBicError(''); }}
                            error={bicError}
                            onCancel={() => { setShowBicVerify(false); setBicError(''); }}
                            onConfirm={confirmBic}
                        />
                    )}
                </div>
            );
        }

        // Popup vérification BIC (virements ≥ 1000 EUR).
        // Overlay centered au-dessus du TransferModal — le step 2 reste visible
        // derrière (semi-transparent) pour respecter la demande "ne pas supprimer
        // les infos déjà existantes".
        function BicVerifyOverlay({ amount, toName, bic, setBic, error, onCancel, onConfirm }) {
            return (
                <div className="fixed inset-0 z-[110] flex items-center justify-center" style={{ background: 'rgba(0,0,0,.55)', padding: 18, animation: 'fadeIn .18s ease' }}>
                    <div style={{ background: 'white', borderRadius: 20, width: '100%', maxWidth: 380, padding: '22px 22px 18px', boxShadow: '0 16px 40px rgba(0,0,0,.25)', animation: 'popIn .28s cubic-bezier(.34,1.1,.64,1) both' }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 14 }}>
                            <div style={{ width: 42, height: 42, borderRadius: '50%', background: '#E8F5E9', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00965E" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                                    <path d="M12 2L3 7v6c0 5 3.8 9.4 9 10 5.2-.6 9-5 9-10V7l-9-5z" />
                                    <path d="M9 12l2 2 4-4" />
                                </svg>
                            </div>
                            <div style={{ minWidth: 0 }}>
                                <h3 style={{ fontSize: 17, fontWeight: 700, color: '#1a1a1a', margin: 0, lineHeight: 1.2 }}>Vérification du virement</h3>
                                <p style={{ fontSize: 12, color: '#888', margin: '3px 0 0' }}>Sécurité renforcée — Réglementation EU</p>
                            </div>
                        </div>
                        <p style={{ fontSize: 13, color: '#3a3a3a', lineHeight: 1.5, margin: '0 0 14px' }}>
                            Conformément à la directive européenne sur les services de paiement (DSP2), tout virement d'un montant supérieur ou égal à <strong>1 000 EUR</strong> nécessite la validation du code <strong>BIC</strong> (Bank Identifier Code) du compte bénéficiaire.
                        </p>
                        <div style={{ background: '#F2F2F7', borderRadius: 12, padding: '10px 14px', marginBottom: 14, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                            <div style={{ minWidth: 0 }}>
                                <p style={{ fontSize: 11, color: '#8e8e93', margin: 0, fontWeight: 500 }}>Bénéficiaire</p>
                                <p style={{ fontSize: 13, fontWeight: 600, color: '#1a1a1a', margin: '2px 0 0', textTransform: 'uppercase' }} className="truncate">{toName}</p>
                            </div>
                            <span style={{ fontSize: 15, fontWeight: 800, color: '#00965E', flexShrink: 0, marginLeft: 12 }}>{amount} EUR</span>
                        </div>
                        <label style={{ display: 'block', fontSize: 11, fontWeight: 600, color: '#8e8e93', textTransform: 'uppercase', letterSpacing: '.04em', marginBottom: 6 }}>Code BIC du destinataire</label>
                        <input
                            type="text"
                            value={bic}
                            onChange={e => setBic(e.target.value.toUpperCase())}
                            placeholder="Ex: GEBABEBB"
                            maxLength={11}
                            autoFocus
                            style={{ width: '100%', fontSize: 16, color: '#1a1a1a', caretColor: '#00965E', background: '#F2F2F7', border: `1.5px solid ${error ? '#E53935' : '#e0e0e5'}`, borderRadius: 12, padding: '12px 14px', outline: 'none', letterSpacing: '.08em', fontFamily: 'monospace', textTransform: 'uppercase' }}
                        />
                        {error && (
                            <p style={{ fontSize: 12, color: '#E53935', margin: '6px 2px 0', display: 'flex', alignItems: 'center', gap: 5 }}>
                                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#E53935" strokeWidth="2.4"><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></svg>
                                {error}
                            </p>
                        )}
                        <p style={{ fontSize: 11, color: '#8e8e93', margin: '8px 2px 18px', lineHeight: 1.4 }}>
                            Le code BIC est généralement composé de 8 ou 11 caractères. Vous le trouverez sur les coordonnées bancaires de votre destinataire.
                        </p>
                        <div style={{ display: 'flex', gap: 10 }}>
                            <button onClick={onCancel} className="press" style={{ flex: 1, background: '#F2F2F7', color: '#1a1a1a', borderRadius: 12, padding: '12px 0', fontSize: 15, fontWeight: 600, border: 'none' }}>
                                Annuler
                            </button>
                            <button onClick={onConfirm} className="press" style={{ flex: 1.4, background: '#2DB34A', color: 'white', borderRadius: 12, padding: '12px 0', fontSize: 15, fontWeight: 600, border: 'none', boxShadow: '0 4px 12px rgba(45,179,74,.25)' }}>
                                Valider
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // Scanner indisponible : ouvre la caméra arrière (preview ~1.4s),
        // puis affiche un message d'erreur "Service momentanément indisponible".
        // Tracks stoppés au démontage. En cas de refus / HTTPS-only / no-camera,
        // on bascule directement sur le message d'erreur (UX cohérente).
        function ScannerOverlay({ onClose }) {
            const videoRef = React.useRef(null);
            const streamRef = React.useRef(null);
            const [showError, setShowError] = useState(false);
            const [streamReady, setStreamReady] = useState(false);

            useEffect(() => {
                let cancelled = false;
                let errorTimer = null;

                const stopStream = () => {
                    if (streamRef.current) {
                        streamRef.current.getTracks().forEach(t => t.stop());
                        streamRef.current = null;
                    }
                };

                async function start() {
                    if (!navigator.mediaDevices?.getUserMedia) {
                        if (!cancelled) setShowError(true);
                        return;
                    }
                    try {
                        // Tente d'abord facingMode=environment strict (mobile),
                        // fallback ideal puis any si non dispo (desktop, etc.)
                        let stream;
                        try {
                            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: 'environment' } }, audio: false });
                        } catch {
                            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
                        }
                        if (cancelled) { stream.getTracks().forEach(t => t.stop()); return; }
                        streamRef.current = stream;
                        if (videoRef.current) {
                            videoRef.current.srcObject = stream;
                            try { await videoRef.current.play(); } catch { /* autoplay block tolerée */ }
                        }
                        setStreamReady(true);
                        // Délai court pour donner l'impression d'une vraie tentative
                        // de scan, puis bascule sur l'erreur.
                        errorTimer = setTimeout(() => { if (!cancelled) setShowError(true); }, 1400);
                    } catch (e) {
                        // Refus permission, navigator non-HTTPS, no camera, etc.
                        if (!cancelled) setShowError(true);
                    }
                }
                start();

                return () => {
                    cancelled = true;
                    if (errorTimer) clearTimeout(errorTimer);
                    stopStream();
                };
            }, []);

            return (
                <div className="fixed inset-0 z-[120]" style={{ background: '#000' }}>
                    {/* Video stream caméra arrière (visible avant l'erreur) */}
                    <video ref={videoRef} playsInline muted autoPlay style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover', opacity: streamReady && !showError ? 1 : (showError ? 0.4 : 0) }} />
                    {/* Overlay viseur (cadre de scan, avant erreur) */}
                    {streamReady && !showError && (
                        <>
                            <div style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,.35)' }} />
                            <div style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%)', width: 240, height: 240, border: '3px solid white', borderRadius: 16, boxShadow: '0 0 0 9999px rgba(0,0,0,.45)' }}>
                                <div style={{ position: 'absolute', top: 0, left: 0, width: 36, height: 36, borderTop: '4px solid #2DB34A', borderLeft: '4px solid #2DB34A', borderTopLeftRadius: 16 }} />
                                <div style={{ position: 'absolute', top: 0, right: 0, width: 36, height: 36, borderTop: '4px solid #2DB34A', borderRight: '4px solid #2DB34A', borderTopRightRadius: 16 }} />
                                <div style={{ position: 'absolute', bottom: 0, left: 0, width: 36, height: 36, borderBottom: '4px solid #2DB34A', borderLeft: '4px solid #2DB34A', borderBottomLeftRadius: 16 }} />
                                <div style={{ position: 'absolute', bottom: 0, right: 0, width: 36, height: 36, borderBottom: '4px solid #2DB34A', borderRight: '4px solid #2DB34A', borderBottomRightRadius: 16 }} />
                            </div>
                            <p style={{ position: 'absolute', top: 'calc(50% + 145px)', left: 0, right: 0, textAlign: 'center', color: 'white', fontSize: 14, fontWeight: 500, textShadow: '0 1px 4px rgba(0,0,0,.6)' }}>Recherche d'un code à scanner...</p>
                        </>
                    )}
                    {/* Erreur "Service momentanément indisponible" */}
                    {showError && (
                        <div className="fixed inset-0 flex items-center justify-center" style={{ background: 'rgba(0,0,0,.55)', padding: 18, animation: 'fadeIn .2s ease', zIndex: 1 }}>
                            <div style={{ background: 'white', borderRadius: 20, width: '100%', maxWidth: 340, padding: '26px 22px 18px', boxShadow: '0 16px 40px rgba(0,0,0,.3)', animation: 'popIn .28s cubic-bezier(.34,1.1,.64,1) both' }}>
                                <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 14 }}>
                                    <div style={{ width: 56, height: 56, borderRadius: '50%', background: '#FFF4E5', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#F4A100" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                                            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
                                            <line x1="12" y1="9" x2="12" y2="13" />
                                            <line x1="12" y1="17" x2="12.01" y2="17" />
                                        </svg>
                                    </div>
                                </div>
                                <h3 style={{ fontSize: 17, fontWeight: 700, color: '#1a1a1a', margin: '0 0 8px', textAlign: 'center' }}>Service momentanément indisponible</h3>
                                <p style={{ fontSize: 13, color: '#5a5a5a', lineHeight: 1.5, margin: '0 0 20px', textAlign: 'center' }}>
                                    Le service de scan n'est pas accessible pour le moment. Veuillez réessayer ultérieurement ou contacter le support si le problème persiste.
                                </p>
                                <button onClick={onClose} className="press" style={{ width: '100%', background: '#00965E', color: 'white', borderRadius: 12, padding: '12px 0', fontSize: 15, fontWeight: 600, border: 'none', boxShadow: '0 4px 12px rgba(0,150,94,.25)' }}>
                                    OK
                                </button>
                            </div>
                        </div>
                    )}
                    {/* Bouton fermeture (toujours dispo, en haut à droite) */}
                    {!showError && (
                        <button onClick={onClose} className="press" style={{ position: 'absolute', top: 'max(20px, env(safe-area-inset-top, 20px))', right: 16, width: 38, height: 38, borderRadius: '50%', background: 'rgba(0,0,0,.45)', border: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center', backdropFilter: 'blur(8px)', WebkitBackdropFilter: 'blur(8px)' }}>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.4" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>
                        </button>
                    )}
                </div>
            );
        }

        function App() {
            const [screen, setScreen] = useState('loading');
            const [transfers, setTransfers] = useState([]);
            const [balances, setBalances] = useState({});
            const [selAcc, setSelAcc] = useState(null);
            const [selTx, setSelTx] = useState(null);
            const [showXfer, setShowXfer] = useState(false);
            const [showSuccess, setShowSuccess] = useState(null);
            const [showScanner, setShowScanner] = useState(false);
            const go = s => setScreen(s);

            useEffect(() => {
                serverLoad().then(({ transfers, balances }) => {
                    setTransfers(transfers);
                    setBalances(balances);
                    setScreen('splash');
                });
            }, []);

            useEffect(() => {
                const map = { loading: '#ffffff', splash: '#ffffff', welcome: '#0a0a0a', pin: '#F2F2F7', dashboard: '#F2F2F7', transactions: '#F2F2F7', txDetail: '#F2F2F7' };
                const bg = map[screen] || '#F2F2F7';
                document.body.style.background = bg;
                document.getElementById('root').style.background = bg;
            }, [screen]);

            const handleTransfer = ({ from_iban, from_id, to_name, to_iban, amount, type, date, comm, bic }) => {
                const newT = { id: Date.now(), from_iban, to_name, to_iban, amount: parseFloat(amount), type, date, comm, ...(bic ? { bic } : {}), created_at: new Date().toISOString() };
                const updated = [newT, ...transfers];
                const newBal = { ...balances, [from_id]: Math.round(((balances[from_id] ?? 0) + parseFloat(amount)) * 100) / 100 };
                setTransfers(updated);
                setBalances(newBal);
                serverSave(updated, newBal);
                setShowXfer(false);
                setShowSuccess({ amount: parseFloat(amount), toName: to_name });
            };

            return (
                <div style={{ position: 'fixed', top: 0, left: 0, right: 0, height: '100svh', overflow: 'hidden', background: 'white', maxWidth: 430, margin: '0 auto' }}>
                    {screen === 'loading' && <div className="fixed inset-0 bg-white flex items-center justify-center"><img src="./logo.svg" width={120} style={{ objectFit: 'contain' }} alt="" /></div>}
                    {screen === 'splash' && <SplashScreen onDone={() => go('welcome')} />}
                    {screen === 'welcome' && <WelcomeScreen onConnect={() => go('pin')} onScanner={() => setShowScanner(true)} />}
                    {screen === 'pin' && <PinScreen onBack={() => go('welcome')} onSuccess={() => go('dashboard')} />}
                    {screen === 'dashboard' && <Dashboard transfers={transfers} balances={balances} onAccountClick={a => { setSelAcc(a); go('transactions'); }} onTransfer={() => setShowXfer(true)} onScanner={() => setShowScanner(true)} />}
                    {screen === 'transactions' && selAcc && <TransactionsPage account={selAcc} transfers={transfers} balances={balances} onBack={() => go('dashboard')} onTransfer={() => setShowXfer(true)} onTxClick={t => { setSelTx(t); go('txDetail'); }} />}
                    {screen === 'txDetail' && selTx && <TransactionDetail tx={selTx} onBack={() => go('transactions')} />}
                    {showXfer && <TransferModal balances={balances} transfers={transfers} defaultFromId={selAcc?.id || CFG.accounts[0]?.id} onSubmit={handleTransfer} onCancel={() => setShowXfer(false)} />}
                    {showSuccess && <SuccessOverlay amount={showSuccess.amount} toName={showSuccess.toName} onClose={() => setShowSuccess(null)} />}
                    {showScanner && <ScannerOverlay onClose={() => setShowScanner(false)} />}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
